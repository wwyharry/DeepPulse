<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepPulse — A 股短线分析 AI Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg: #111827; --card: #1f2937; --border: #374151; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .thinking-block { border-left: 2px solid #3b82f6; padding-left: 12px; color: #9ca3af; font-size: 0.875rem; white-space: pre-wrap; }
    .tool-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #1f2937; border-radius: 6px; font-size: 0.75rem; font-family: monospace; margin: 2px; }
    .tool-badge.done { color: #22c55e; }
    .tool-badge.calling { color: #eab308; }
    .cursor-blink { display: inline-block; width: 2px; height: 16px; background: #3b82f6; animation: blink 1s infinite; margin-left: 2px; vertical-align: text-bottom; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* Markdown */
    .markdown-body { line-height: 1.7; }
    .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #fff; }
    .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin: 0.8rem 0 0.4rem; color: #fff; }
    .markdown-body h3 { font-size: 1.1rem; font-weight: 600; margin: 0.6rem 0 0.3rem; color: #e5e7eb; }
    .markdown-body p { margin: 0.4rem 0; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.5rem; margin: 0.4rem 0; }
    .markdown-body li { margin: 0.2rem 0; }
    .markdown-body code { background: #374151; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #fbbf24; }
    .markdown-body pre { background: #0d1117; border-radius: 8px; padding: 12px; margin: 0.5rem 0; overflow-x: auto; }
    .markdown-body pre code { background: none; padding: 0; color: #e5e7eb; }
    .markdown-body blockquote { border-left: 3px solid #6b7280; padding-left: 12px; color: #9ca3af; margin: 0.5rem 0; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.875rem; }
    .markdown-body th, .markdown-body td { border: 1px solid #374151; padding: 6px 10px; text-align: left; }
    .markdown-body th { background: #1f2937; font-weight: 600; }
    .markdown-body strong { color: #fff; }
    .markdown-body em { color: #9ca3af; }
    .markdown-body a { color: #60a5fa; text-decoration: underline; }
    .markdown-body hr { border: none; border-top: 1px solid #374151; margin: 1rem 0; }

    /* 表格 */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .data-table th { background: #1f2937; padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #374151; position: sticky; top: 0; z-index: 1; }
    .data-table td { padding: 6px 12px; border-bottom: 1px solid #1a1f2e; }
    .data-table tr:hover td { background: #1f2937; }
    .text-up { color: #ef4444; }
    .text-down { color: #22c55e; }
    .text-flat { color: #6b7280; }

    /* 卡片 */
    .metric-card { background: #1f2937; border-radius: 10px; padding: 16px 20px; border: 1px solid #374151; }
    .metric-label { font-size: 0.75rem; color: #9ca3af; margin-bottom: 4px; }
    .metric-value { font-size: 1.5rem; font-weight: 700; }

    /* K 线图 */
    .kline-canvas { background: #0d1117; border-radius: 8px; }
  </style>
</head>
<body class="h-screen flex flex-col">

<script>
marked.setOptions({ breaks: true, gfm: true });

let ws = null, currentSessionId = null, sessions = [], isStreaming = false;
let fullThinking = '', fullContent = '', allStrategies = [];
let currentMarketTab = 'sentiment';

// ═══ 页面切换 ═══
function showPage(name) {
  ['chat','market','analysis','screener','news','portfolio','strategies'].forEach(p => {
    document.getElementById('page-' + p).classList.toggle('hidden', p !== name);
  });
  document.querySelectorAll('.nav-btn').forEach(el => {
    el.classList.toggle('text-white', el.dataset.page === name);
    el.classList.toggle('text-gray-400', el.dataset.page !== name);
  });
  if (name === 'strategies' && allStrategies.length === 0) loadStrategies();
  if (name === 'market') { loadWatchlistQuick(); showMarketTab(currentMarketTab); }
  if (name === 'news') { loadMarketHotNews(); loadNewsStockList(); }
}

function showMarketTab(tab) {
  currentMarketTab = tab;
  document.querySelectorAll('.market-tab').forEach(el => {
    el.classList.toggle('bg-blue-600', el.dataset.tab === tab);
    el.classList.toggle('bg-gray-700', el.dataset.tab !== tab);
  });
  const content = document.getElementById('market-content');
  switch(tab) {
    case 'sentiment': loadSentiment(); break;
    case 'limitup': loadLimitUp(); break;
    case 'overview': loadOverview(); break;
    case 'stock': content.innerHTML = '<div class="text-center text-gray-500 py-20">在右上角搜索框输入股票代码或名称</div>'; break;
  }
}

// ═══ 会话管理 ═══
async function loadSessionList() {
  try {
    const data = await fetchJSON('/api/system/sessions');
    sessions = (data.sessions || []).map(s => {

          title = `会话 (${s.message_count}条消息)`;

      }
      return {
        id: s.id,
        title: title,
        updated_at: s.updated_at,
        message_count: s.message_count || 0
      };

// ═══ WebSocket ═══
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
  ws.onopen = () => setStatus('已连接', '🟢');
  ws.onclose = () => { setStatus('已断开', '🔴'); setTimeout(connect, 3000); };
  ws.onerror = () => setStatus('连接错误', '🔴');
  ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
}

let judgeContent = '';

function handleEvent(data) {
  switch (data.type) {
    case 'session':
      currentSessionId = data.session_id;
      if (!sessions.find(s => s.id === currentSessionId)) {
        sessions.unshift({ id: currentSessionId, title: '' });
        loadSessionList();
      }
      updateSessionList();
      break;
    case 'thinking': fullThinking += data.delta; updateAssistantMessage(); break;
    case 'content': fullContent += data.delta; updateAssistantMessage(); break;
    case 'tool_call': addToolBadge(data.name, 'calling'); break;
    case 'tool_result': updateToolBadge(data.name, 'done'); break;
    case 'done':
      isStreaming = false;
      document.getElementById('btn-send').classList.remove('hidden');
      document.getElementById('btn-stop').classList.add('hidden');
      document.getElementById('btn-judge').classList.remove('hidden');
      setStatus('就绪');
      updateStatusInfo(data.rounds, data.tools);
      // 更新会话标题（基于用户消息）
      updateSessionTitle(lastUserMessage, fullContent);
      break;
    case 'error':
      isStreaming = false;
      document.getElementById('btn-send').classList.remove('hidden');
      document.getElementById('btn-stop').classList.add('hidden');
      document.getElementById('btn-judge').classList.remove('hidden');
      appendMessage('error', data.message);
      break;
    // 评测事件
    case 'judge_start':
      judgeContent = '';
      judgeSummary = {};
      appendJudgeMessage();
      break;
    case 'judge_content':
      judgeContent += data.delta;
      updateJudgeMessage();
      break;
    case 'judge_score':
      updateJudgeScore(data.score);
      break;
    case 'judge_dimension':
      updateJudgeDimension(data.data);
      break;
    case 'judge_tool_call':
      addJudgeToolCall(data.data);
      break;
    case 'judge_summary':
      judgeSummary = data.data;
      break;
    case 'judge_done':
      isStreaming = false;
      document.getElementById('btn-judge').classList.remove('hidden');
      setStatus('评测完成');
      showJudgeSaveButton();
      break;
  }
}

function appendMessage(role, content) {
  const div = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = 'fade-in';
  if (role === 'user') { msg.className += ' flex justify-end'; msg.innerHTML = `<div class="max-w-[70%] px-4 py-2.5 bg-blue-600 text-white rounded-lg">${escapeHtml(content)}</div>`; }
  else if (role === 'error') { msg.innerHTML = `<div class="px-4 py-2.5 bg-red-900/50 border border-red-700 text-red-200 rounded-lg">${escapeHtml(content)}</div>`; }
  div.appendChild(msg); div.scrollTop = div.scrollHeight;
}

function updateAssistantMessage() {
  const div = document.getElementById('messages');
  let msg = document.getElementById('current-assistant');
  if (!msg) { msg = document.createElement('div'); msg.id = 'current-assistant'; msg.className = 'fade-in'; div.appendChild(msg); }
  let html = '';
  if (fullThinking) {
    html += `<details open class="mb-3"><summary class="text-sm text-gray-400 cursor-pointer hover:text-gray-200 flex items-center gap-2 select-none">🧠 推理过程 ${isStreaming ? '<span class="w-2 h-2 bg-blue-400 rounded-full animate-pulse"></span>' : ''}</summary><div class="thinking-block mt-2">${escapeHtml(fullThinking)}${isStreaming ? '<span class="cursor-blink"></span>' : ''}</div></details>`;
  }
  if (fullContent) {
    html += `<div class="px-4 py-3 bg-[#1f2937] rounded-lg markdown-body">${marked.parse(fullContent)}${isStreaming ? '<span class="cursor-blink"></span>' : ''}</div>`;
  }
  if (isStreaming && !fullThinking && !fullContent) { html += `<div class="px-4 py-3 bg-[#1f2937] rounded-lg"><span class="cursor-blink"></span></div>`; }
  msg.innerHTML = html; div.scrollTop = div.scrollHeight;
}

let lastUserMessage = '';

function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming || !ws || ws.readyState !== WebSocket.OPEN) return;
  lastUserMessage = text;  // 保存用户消息用于生成标题
  fullThinking = ''; fullContent = '';
  document.getElementById('current-assistant')?.remove();
  document.getElementById('tool-panel').innerHTML = '';
  appendMessage('user', text); input.value = '';
  isStreaming = true; document.getElementById('btn-send').classList.add('hidden'); document.getElementById('btn-stop').classList.remove('hidden'); setStatus('分析中...', '⏳');
  ws.send(JSON.stringify({ type: 'message', content: text, session_id: currentSessionId || undefined }));
}

function stopStream() {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'stop' }));
  isStreaming = false; document.getElementById('btn-send').classList.remove('hidden'); document.getElementById('btn-stop').classList.add('hidden'); setStatus('已停止');
}

function runJudge() {
  if (isStreaming || !ws || ws.readyState !== WebSocket.OPEN) return;
  if (!currentSessionId) { alert('请先进行一次对话再评测'); return; }

  isStreaming = true;
  document.getElementById('btn-judge').classList.add('hidden');
  setStatus('评测中...', '📊');

  ws.send(JSON.stringify({ type: 'judge', session_id: currentSessionId }));
}

function updateSessionTitle(userMessage, assistantContent) {
  // 从用户消息生成会话标题
  if (!currentSessionId) return;
  const session = sessions.find(s => s.id === currentSessionId);
  if (!session || session.title) return; // 已有标题则不更新

  // 优先使用用户消息作为标题
  let title = '';
  if (userMessage) {
    // 清理用户消息，提取关键信息
    title = userMessage
      .replace(/[，。！？、；：""''（）【】\[\]]/g, ' ')  // 替换标点
      .replace(/\s+/g, ' ')  // 合并空格
      .trim();
    // 截取前25个字符
    if (title.length > 25) {
      title = title.substring(0, 25) + '...';
    }
  }

  if (title) {
    session.title = title;
    updateSessionList();
    // 持久化到后端
    saveSessionTitle(currentSessionId, title);
  }
}

// ═══ 工具函数 ═══
function escapeHtml(str) { if (str == null) return ''; const d = document.createElement('div'); d.textContent = String(str); return d.innerHTML; }
function setStatus(text, icon = '') { document.getElementById('status-text').textContent = (icon ? icon + ' ' : '') + text; }
function updateStatusInfo(r, t) { if (r || t) document.getElementById('status-info').textContent = `Round ${r} | 工具 ${t} 次`; }
function formatChange(val) { if (val == null || isNaN(val)) return '-'; const n = parseFloat(val); const cls = n > 0 ? 'text-up' : n < 0 ? 'text-down' : 'text-flat'; return `<span class="${cls}">${n > 0 ? '+' : ''}${n.toFixed(2)}%</span>`; }
function formatPrice(val) { return val == null || isNaN(val) ? '-' : parseFloat(val).toFixed(2); }
function formatVolume(val) { if (val == null) return '-'; const n = parseFloat(val); if (n >= 1e8) return (n/1e8).toFixed(2) + '亿'; if (n >= 1e4) return (n/1e4).toFixed(1) + '万'; return n.toFixed(0); }
async function fetchJSON(url, method) { const opts = method === 'POST' ? { method: 'POST' } : {}; return (await fetch(url, opts)).json(); }

  if (!t || t.length < 4) return t || '-';
  return t.substring(0,2) + ':' + t.substring(2,4) + (t.length >= 6 ? ':' + t.substring(4,6) : '');
}

// ═══ K 线图绘制 ═══
function drawKlineChart(data, canvasId) {
  const canvas = document.getElementById(canvasId || 'kline-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const prices = data.flatMap(d => [parseFloat(d.high), parseFloat(d.low)]).filter(v => !isNaN(v));
  if (!prices.length) return;

  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const range = maxP - minP || 1;
  const pad = 40;
  const barW = (W - pad * 2) / data.length;
  const scaleY = (v) => H - pad - ((v - minP) / range) * (H - pad * 2);

  ctx.clearRect(0, 0, W, H);

  // 网格
  ctx.strokeStyle = '#1f2937'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad + (i / 4) * (H - pad * 2);
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W - pad, y); ctx.stroke();
    ctx.fillStyle = '#6b7280'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    ctx.fillText((maxP - (i / 4) * range).toFixed(2), pad - 4, y + 4);
  }

  // K 线
  data.forEach((d, i) => {
    const o = parseFloat(d.open), c = parseFloat(d.close), h = parseFloat(d.high), l = parseFloat(d.low);
    if (isNaN(o)) return;
    const x = pad + i * barW + barW / 2;
    const isUp = c >= o;
    const color = isUp ? '#ef4444' : '#22c55e';

    // 影线
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, scaleY(h)); ctx.lineTo(x, scaleY(l)); ctx.stroke();

    // 实体
    const bodyTop = scaleY(Math.max(o, c));
    const bodyBot = scaleY(Math.min(o, c));
    const bodyH = Math.max(bodyBot - bodyTop, 1);
    ctx.fillStyle = color;
    if (isUp) { ctx.fillRect(x - barW * 0.35, bodyTop, barW * 0.7, bodyH); }
    else { ctx.fillRect(x - barW * 0.35, bodyTop, barW * 0.7, bodyH); }
  });
}

          const confBar = p.confidence ? '●'.repeat(Math.round(p.confidence * 5)) + '○'.repeat(5 - Math.round(p.confidence * 5)) : '';
          return `

  } else if (typeof content === 'object') {

    const keys = Object.keys(content);
    html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-3">';

function formatBacktestResult(code, content) {
  if (typeof content === 'string') {
    try { content = JSON.parse(content); } catch(e) {}
  }

  let html = `<div class="mb-3 text-sm text-gray-400">${code} 回测结果</div>`;

  if (typeof content === 'object' && content !== null) {
    // 核心指标卡片
    const metrics = {};
    const metricKeys = ['total_return', 'annual_return', 'max_drawdown', 'sharpe_ratio', 'win_rate', 'trade_count',
                        '总收益率', '年化收益', '最大回撤', '夏普比率', '胜率', '交易次数', '收益率', '回撤'];
    for (const k of Object.keys(content)) {
      if (metricKeys.some(mk => k.toLowerCase().includes(mk.toLowerCase()) || mk.includes(k))) {
        metrics[k] = content[k];
      }
    }

    if (Object.keys(metrics).length > 0) {
      html += '<div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">';
      for (const [k, v] of Object.entries(metrics)) {
        const val = typeof v === 'number' ?
          (k.includes('率') || k.includes('return') || k.includes('drawdown') ? (v * 100).toFixed(2) + '%' : v.toFixed(2)) :
          String(v);
        const color = k.includes('收益') || k.includes('return') ? (v > 0 ? 'text-up' : 'text-down') :
                      k.includes('回撤') || k.includes('drawdown') ? 'text-down' : '';
        html += `<div class="metric-card"><div class="metric-label">${escapeHtml(k)}</div><div class="text-lg font-mono ${color}">${escapeHtml(val)}</div></div>`;
      }
      html += '</div>';
    }

    // 其他字段
    const otherKeys = Object.keys(content).filter(k => !metricKeys.some(mk => k.toLowerCase().includes(mk.toLowerCase()) || mk.includes(k)));
    if (otherKeys.length > 0) {
      html += '<div class="metric-card"><div class="metric-label mb-2">详细数据</div>';
      for (const k of otherKeys) {
        const v = content[k];
        if (typeof v === 'object' && v !== null) {
          html += `<div class="mb-2"><span class="text-sm text-gray-400">${escapeHtml(k)}:</span><pre class="text-xs text-gray-300 mt-1 bg-[#111827] p-2 rounded">${escapeHtml(JSON.stringify(v, null, 2))}</pre></div>`;
        } else {
          html += `<div class="flex justify-between py-1 border-b border-gray-800"><span class="text-sm text-gray-400">${escapeHtml(k)}</span><span class="text-sm font-mono">${escapeHtml(String(v ?? '-'))}</span></div>`;
        }
      }
      html += '</div>';
    }
  } else {
    html += `<div class="metric-card"><pre class="text-sm text-gray-300 whitespace-pre-wrap">${escapeHtml(JSON.stringify(content, null, 2))}</pre></div>`;
  }

  return html;
}

// ═══ 分析工具 ═══
async function runAnalysis(type) {
  const code = document.getElementById('ana-code').value.trim();
  const days = parseInt(document.getElementById('ana-days').value) || 60;
  if (!code) { alert('请输入股票代码'); return; }
  const el = document.getElementById('analysis-content');
  el.innerHTML = '<div class="flex items-center justify-center h-full text-gray-500"><div class="text-center"><div class="animate-spin text-2xl mb-2">⏳</div><div>分析中...</div></div></div>';

  // 高亮当前按钮
  document.querySelectorAll('.ana-btn').forEach(btn => btn.classList.remove('bg-blue-600', 'text-white'));
  event.target.classList.add('bg-blue-600', 'text-white');

  try {
    let data, content;
    switch (type) {
      case 'kline':
        data = await fetchJSON(`/api/market/stocks/${code}/kline?days=${days}`);
        let kline = data.kline; if (typeof kline === 'string') kline = JSON.parse(kline);
        const items = kline.kline || kline;
        if (!Array.isArray(items)) { el.innerHTML = `<div class="metric-card"><pre class="text-sm">${escapeHtml(JSON.stringify(kline, null, 2))}</pre></div>`; return; }
        el.innerHTML = `
          <div class="mb-3 text-sm text-gray-400">${code} K 线数据 (最近 ${days} 天)</div>
          <div class="mb-4"><canvas id="ana-kline" class="kline-canvas w-full" height="300"></canvas></div>
          <table class="data-table"><thead><tr><th>日期</th><th>开盘</th><th>最高</th><th>最低</th><th>收盘</th><th>涨跌幅</th><th>成交量</th></tr></thead>
            <tbody>${items.slice(-20).reverse().map(k => `<tr><td>${k.date||k.trade_date||'-'}</td><td>${formatPrice(k.open)}</td><td>${formatPrice(k.high)}</td><td>${formatPrice(k.low)}</td><td>${formatPrice(k.close)}</td><td>${formatChange(k.change_pct||k.pct_change)}</td><td>${formatVolume(k.volume)}</td></tr>`).join('')}</tbody></table>`;
        setTimeout(() => drawKlineChart(items.slice(-60), 'ana-kline'), 100);
        break;

      case 'technical':
        data = await fetchJSON(`/api/market/stocks/${code}/technical?days=${days}`);
        content = data.technical; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatTechnicalResult(code, content);
        break;

      case 'patterns':
        data = await fetchJSON(`/api/analysis/patterns?code=${code}&days=${days}`, 'POST');
        content = data.patterns; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatPatternsResult(code, content);
        break;

      case 'trend':
        data = await fetchJSON(`/api/analysis/trend?code=${code}&days=${days}`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatTrendResult(code, content);
        break;

      case 'divergence':
        data = await fetchJSON(`/api/analysis/divergence?code=${code}&indicator=all&days=${days}`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatDivergenceResult(code, content);
        break;

      case 'support_resistance':
        data = await fetchJSON(`/api/analysis/support_resistance?code=${code}&days=${days}`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatSupportResistanceResult(code, content);
        break;

      case 'volume_price':
        data = await fetchJSON(`/api/analysis/volume_price?code=${code}&days=${days}`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatVolumePriceResult(code, content);
        break;

      case 'confluence':
        data = await fetchJSON(`/api/analysis/confluence?code=${code}`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatConfluenceResult(code, content);
        break;

      case 'backtest':
        data = await fetchJSON(`/api/analysis/backtest?code=${code}&strategy=ma_cross&days=${days}`, 'POST');
        content = data.backtest; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatBacktestResult(code, content);
        break;

      case 'fund_flow':
        data = await fetchJSON(`/api/analysis/fund_flow?code=${code}`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatFundFlowResult(code, content);
        break;

      case 'dragon_tiger':
        data = await fetchJSON(`/api/analysis/dragon_tiger?code=${code}`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatDragonTigerResult(code, content);
        break;

      case 'screener':
        el.innerHTML = `
          <div class="max-w-2xl">
            <h3 class="text-lg font-bold mb-4">条件选股</h3>
            <div class="metric-card mb-4">
              <div class="text-sm text-gray-400 mb-2">输入筛选条件（逗号分隔）</div>
              <div class="flex gap-2">
                <input id="screener-input" type="text" value="多头排列,放量" placeholder="如: 多头排列,放量,涨幅>3%"
                  class="flex-1 px-3 py-2 bg-[#111827] border border-gray-700 rounded text-sm text-gray-200">
                <button onclick="runScreener()" class="px-4 py-2 bg-blue-600 text-white text-sm rounded">筛选</button>
              </div>
              <div class="text-xs text-gray-500 mt-2">支持: 多头排列, 放量, 缩量, MACD金叉, 涨幅>N%, 量比>N</div>
            </div>
            <div id="screener-result"></div>
          </div>`;
        break;

      case 'stock_news':
        data = await fetchJSON(`/api/analysis/stock_news?code=${code}`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatNewsResult(code, content);
        break;

      case 'market_news':
        data = await fetchJSON(`/api/analysis/market_news`, 'POST');
        content = data; if (typeof content === 'string') content = JSON.parse(content);
        el.innerHTML = formatMarketNewsResult(content);
        break;

      default:
        el.innerHTML = '<div class="text-gray-500">未知分析类型</div>';
    }
  } catch (e) { el.innerHTML = `<div class="text-red-400">分析失败: ${e.message}</div>`; }
}

function formatTrendResult(code, data) {
  if (data.error) return `<div class="text-red-400">${data.error}</div>`;
  const scoreColor = data.strength >= 65 ? 'text-up' : data.strength <= 35 ? 'text-down' : 'text-flat';
  return `
    <div class="max-w-3xl space-y-4">
      <div class="flex items-center justify-between">
        <h3 class="text-lg font-bold">${code} 趋势分析</h3>
        <span class="text-2xl font-bold ${scoreColor}">${data.strength}/100</span>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="metric-card"><div class="metric-label">方向</div><div class="text-lg font-bold ${scoreColor}">${data.direction_cn}</div></div>
        <div class="metric-card"><div class="metric-label">阶段</div><div class="text-lg">${data.phase_cn}</div></div>
        <div class="metric-card"><div class="metric-label">均线</div><div class="text-sm">${data.signals?.ma_alignment || '-'}</div></div>
        <div class="metric-card"><div class="metric-label">ADX</div><div class="text-sm">${data.signals?.adx || '-'}</div></div>
      </div>
      <div class="metric-card">
        <div class="metric-label mb-2">详细信号</div>
        <div class="grid grid-cols-2 gap-2 text-sm">
          ${Object.entries(data.signals || {}).map(([k, v]) => `<div><span class="text-gray-400">${k}:</span> ${v}</div>`).join('')}
        </div>
      </div>
      <div class="metric-card border-blue-500/30"><div class="metric-label">💡 结论</div><div class="text-sm mt-1">${data.conclusion}</div></div>
    </div>`;
}

function formatDivergenceResult(code, data) {
  if (data.error) return `<div class="text-red-400">${data.error}</div>`;
  const divs = data.divergences || [];
  return `
    <div class="max-w-3xl space-y-4">
      <h3 class="text-lg font-bold">${code} 背离检测</h3>
      ${divs.length === 0 ? '<div class="metric-card text-gray-400">未检测到背离信号</div>' : `
        <div class="space-y-2">

            <div class="metric-card ${d.type === 'bullish_divergence' ? 'border-green-500/30' : 'border-red-500/30'}">
              <div class="flex items-center justify-between mb-1">
                <span class="font-medium ${d.type === 'bullish_divergence' ? 'text-up' : 'text-down'}">${d.type_cn}</span>
                <span class="text-xs text-gray-400">${d.indicator.toUpperCase()} | 强度: ${d.strength}</span>
              </div>
              <div class="text-sm text-gray-300">${d.description}</div>

}

  return `
    <div class="max-w-3xl space-y-4">
      <div class="flex items-center justify-between">
        <h3 class="text-lg font-bold">${code} 多周期共振</h3>
        <span class="text-3xl font-bold ${scoreColor}">${score}/100</span>
      </div>
      <div class="grid grid-cols-3 gap-3">
        ${Object.entries(data.timeframes || {}).filter(([_, v]) => v).map(([k, tf]) => `
          <div class="metric-card">
            <div class="metric-label">${tf.label}</div>
            <div class="text-lg font-bold ${tf.score >= 60 ? 'text-up' : tf.score <= 40 ? 'text-down' : ''}">${tf.trend_cn}</div>

            <div class="text-xs text-gray-500 mt-1">${tf.ma_alignment} | ${tf.macd}</div>

      </div>

function formatFundFlowResult(code, data) {
  if (data.error) return `<div class="text-red-400">${escapeHtml(data.error)}</div>`;

  const flow = data.fund_flow || data;

  return `
    <div class="max-w-3xl space-y-4">
      <h3 class="text-lg font-bold">${code} 资金流向</h3>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <div class="metric-card"><div class="metric-label">主力净流入</div><div class="text-lg font-mono ${mainFlow > 0 ? 'text-up' : 'text-down'}">${formatVolume(mainFlow)}</div></div>
          ${flow['超大单净流入'] ? `<div class="metric-card"><div class="metric-label">超大单</div><div class="text-lg font-mono ${flow['超大单净流入'] > 0 ? 'text-up' : 'text-down'}">${formatVolume(flow['超大单净流入'])}</div></div>` : ''}

async function runScreener() {
  const input = document.getElementById('screener-input');
  const result = document.getElementById('screener-result');
  if (!input || !result) return;
  result.innerHTML = '<div class="text-gray-500">筛选中...</div>';

  try {
    const data = await fetchJSON(`/api/analysis/screener?conditions=${encodeURIComponent(input.value)}&limit=20`, 'POST');
    if (data.error) { result.innerHTML = `<div class="text-red-400">${data.error}</div>`; return; }
    const stocks = data.results || [];
    result.innerHTML = `

      <table class="data-table">
        <thead><tr><th>代码</th><th>名称</th><th>价格</th><th>涨跌幅</th><th>量比</th><th>操作</th></tr></thead>
        <tbody>${stocks.map(s => `
          <tr>
            <td class="font-mono">${escapeHtml(s.code)}</td>
            <td>${escapeHtml(s.name || '-')}</td>
            <td>${formatPrice(s.close)}</td>
            <td>${formatChange(s.pct_change)}</td>
            <td>${s.vol_ratio ? parseFloat(s.vol_ratio).toFixed(1) : '-'}</td>
            <td><button onclick="document.getElementById('ana-code').value='${s.code}';runAnalysis('trend')" class="text-blue-400 text-sm">分析</button></td>
          </tr>
        `).join('')}</tbody>
      </table>`;
  } catch (e) { result.innerHTML = `<div class="text-red-400">筛选失败: ${e.message}</div>`; }
}

      html += `

                  <span class="text-up font-bold">${ind.zt_count} 只涨停</span>

            <thead><tr><th>排名</th><th>板块</th><th>涨跌幅</th><th>上涨/下跌</th><th>净流入(亿)</th><th>领涨股</th><th>领涨涨幅</th></tr></thead>
            <tbody>${industrySectors.map((s, i) => `
              <tr>
                <td>${i + 1}</td>
                <td class="font-medium">${escapeHtml(s.name || '-')}</td>
                <td>${formatChange(s.change_pct)}</td>
                <td><span class="text-up">${s.up_count || '-'}</span> / <span class="text-down">${s.down_count || '-'}</span></td>
                <td class="${(s.inflow || 0) > 0 ? 'text-up' : 'text-down'}">${s.inflow ? s.inflow.toFixed(2) : '-'}</td>
                <td>${escapeHtml(s.leader || '-')}</td>
                <td>${s.leader_change ? formatChange(s.leader_change) : '-'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    // 概念板块
    let conceptSectors = conceptRes.sectors || [];
    if (typeof conceptSectors === 'string') {
      try { conceptSectors = JSON.parse(conceptSectors); } catch(e) { conceptSectors = []; }
    }
    if (Array.isArray(conceptSectors) && conceptSectors.length > 0) {
      html += `
        <div>
          <h3 class="text-lg font-bold mb-3">💡 热门概念板块</h3>

                ${s.leader && s.leader !== '--' ? `<div class="text-xs text-blue-400 mt-1">龙头: ${escapeHtml(s.leader)}</div>` : ''}
              </div>`).join('')}
          </div>
        </div>`;

    // 如果所有数据都为空

async function loadStrategies() {
  const list = document.getElementById('strategy-list');
  list.innerHTML = '<div class="text-center text-gray-500 py-4 text-sm">加载中...</div>';
  try {
    const data = await fetchJSON('/api/analysis/strategies');
    let s = data.strategies;
    if (typeof s === 'string') s = JSON.parse(s);
    // 兼容 {total, strategies: [...]} 或直接 [...]
    const arr = Array.isArray(s) ? s : (s.strategies || []);
    if (!arr.length) { list.innerHTML = '<div class="text-gray-500 text-sm p-2">暂无战法</div>'; return; }
    allStrategies = arr;
    renderStrategyList(arr);
  } catch (e) { list.innerHTML = `<div class="text-red-400 text-sm p-2">加载失败: ${e.message}</div>`; }

function renderStrategyList(strategies) {
  document.getElementById('strategy-list').innerHTML = strategies.map((s, i) => `
    <div class="px-3 py-2 rounded cursor-pointer text-sm hover:bg-gray-800 text-gray-300" onclick="showStrategy(${i})">
      <div class="font-medium">${escapeHtml(s.name || s.file || '未命名')}</div>
      <div class="text-xs text-gray-500 mt-0.5">${escapeHtml((s.tags || []).join(', ') || '无标签')}</div>
    </div>`).join('');
}

function filterStrategies() {
  const q = document.getElementById('strategy-search').value.trim().toLowerCase();
  if (!q) { renderStrategyList(allStrategies); return; }
  renderStrategyList(allStrategies.filter(s => (s.name||'').toLowerCase().includes(q) || (s.file||'').toLowerCase().includes(q) || (s.tags||[]).some(t => t.toLowerCase().includes(q))));
}

let currentStrategyIndex = -1;
let isEditingStrategy = false;

async function showStrategy(index) {
  currentStrategyIndex = index;
  isEditingStrategy = false;
  const s = allStrategies[index];
  const el = document.getElementById('strategy-detail');
  el.innerHTML = '<div class="text-center text-gray-500 py-10">加载中...</div>';
  try {
    const data = await fetchJSON(`/api/analysis/strategies/${encodeURIComponent(s.file || s.name)}`);
    let content = data.strategy; if (typeof content === 'string') content = JSON.parse(content);
    const text = content.content || content || '暂无内容';
    renderStrategyView(s, text);
  } catch (e) { el.innerHTML = `<div class="text-red-400">加载失败</div>`; }
}

        <div class="flex-1 flex flex-col border-r border-gray-800">
          <div class="px-4 py-1.5 bg-[#1f2937] border-b border-gray-800 text-xs text-gray-400">Markdown 编辑</div>
          <textarea id="strategy-editor" class="flex-1 p-4 bg-[#0d1117] text-gray-200 font-mono text-sm resize-none focus:outline-none" oninput="updateStrategyPreview()"></textarea>
        </div>
        <div class="flex-1 flex flex-col">
          <div class="px-4 py-1.5 bg-[#1f2937] border-b border-gray-800 text-xs text-gray-400">实时预览</div>
          <div id="strategy-preview" class="flex-1 overflow-y-auto p-4 markdown-body"></div>
        </div>
      </div>
      <div class="px-4 py-2 border-t border-gray-800 flex items-center justify-between bg-[#111827]">
        <span id="strategy-save-status" class="text-sm text-gray-400"></span>
        <div class="flex gap-2">
          <button onclick="cancelStrategyEdit()" class="px-4 py-1.5 bg-gray-700 hover:bg-gray-600 text-white text-sm rounded">取消</button>
          <button onclick="saveStrategy()" class="px-4 py-1.5 bg-green-600 hover:bg-green-700 text-white text-sm rounded">保存</button>
        </div>
      </div>
    </div>`;

  // 存储当前内容
  el.dataset.content = text;
  el.dataset.filename = s.file;
}

function toggleStrategyEdit() {
  const el = document.getElementById('strategy-detail');
  const text = el.dataset.content || '';
  const view = document.getElementById('strategy-view');
  const editorWrap = document.getElementById('strategy-editor-wrap');
  const editor = document.getElementById('strategy-editor');

  if (isEditingStrategy) {
    // 切换到预览
    view.classList.remove('hidden');
    editorWrap.classList.add('hidden');
    isEditingStrategy = false;
  } else {
    // 切换到编辑
    editor.value = text;
    updateStrategyPreview();
    view.classList.add('hidden');
    editorWrap.classList.remove('hidden');
    editor.focus();
    isEditingStrategy = true;
  }
}

function updateStrategyPreview() {
  const editor = document.getElementById('strategy-editor');
  const preview = document.getElementById('strategy-preview');
  preview.innerHTML = marked.parse(editor.value);
}

function cancelStrategyEdit() {
  isEditingStrategy = false;
  const view = document.getElementById('strategy-view');
  const editorWrap = document.getElementById('strategy-editor-wrap');
  view.classList.remove('hidden');
  editorWrap.classList.add('hidden');
}

async function saveStrategy() {
  const el = document.getElementById('strategy-detail');
  const filename = el.dataset.filename;
  const editor = document.getElementById('strategy-editor');
  const content = editor.value;
  const status = document.getElementById('strategy-save-status');

  status.textContent = '保存中...';
  status.className = 'text-sm text-yellow-400';

  try {
    const res = await fetch(`/api/analysis/strategies/${encodeURIComponent(filename)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const data = await res.json();

    if (data.error) {
      status.textContent = '错误: ' + data.error;
      status.className = 'text-sm text-red-400';
      return;
    }

    // 更新本地数据
    el.dataset.content = content;
    status.textContent = '✅ 已保存';
    status.className = 'text-sm text-green-400';

    // 刷新列表
    await loadStrategies();

    // 2秒后切回预览
    setTimeout(() => {
      isEditingStrategy = false;
      document.getElementById('strategy-view').classList.remove('hidden');
      document.getElementById('strategy-editor-wrap').classList.add('hidden');
      // 更新预览内容
      document.getElementById('strategy-view').innerHTML = `
        <div class="max-w-3xl mx-auto">
          <div class="bg-[#1f2937] rounded-lg p-6 markdown-body">${marked.parse(content)}</div>
        </div>`;
    }, 1000);
  } catch (e) {
    status.textContent = '保存失败: ' + e.message;
    status.className = 'text-sm text-red-400';
  }
}

async function deleteStrategy(index) {
  const s = allStrategies[index];
  if (!confirm(`确认删除战法「${s.name}」？此操作不可撤销。`)) return;

  try {
    const res = await fetch(`/api/analysis/strategies/${encodeURIComponent(s.file)}`, { method: 'DELETE' });
    const data = await res.json();

    if (data.error) {
      alert('删除失败: ' + data.error);
      return;
    }

    // 刷新列表
    await loadStrategies();

    // 清空详情
    document.getElementById('strategy-detail').innerHTML = `
      <div class="text-center text-gray-500 py-20">战法已删除</div>`;
    currentStrategyIndex = -1;
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

function createNewStrategy() {
  const el = document.getElementById('strategy-detail');
  currentStrategyIndex = -1;
  isEditingStrategy = true;

  el.innerHTML = `
    <div class="px-4 py-2 border-b border-gray-800 flex items-center justify-between bg-[#111827] shrink-0">
      <span class="text-sm font-medium text-gray-200">新建战法</span>
      <div class="flex items-center gap-2">
        <input id="new-strategy-filename" type="text" placeholder="文件名 (如: 41-新战法.md)"
          class="px-3 py-1.5 bg-[#1f2937] border border-gray-700 rounded text-sm text-gray-200 w-48">
      </div>
    </div>
    <div class="flex-1 flex overflow-hidden">
      <div class="flex-1 flex flex-col border-r border-gray-800">
        <div class="px-4 py-1.5 bg-[#1f2937] border-b border-gray-800 text-xs text-gray-400">Markdown 编辑</div>
        <textarea id="new-strategy-editor" class="flex-1 p-4 bg-[#0d1117] text-gray-200 font-mono text-sm resize-none focus:outline-none"
          oninput="updateNewStrategyPreview()"
          placeholder="# 战法名称

## 适用场景
描述适用的市场环境...

## 核心条件
- 条件1
- 条件2

## 买入信号
- 信号1

## 卖出信号
- 止盈条件
- 止损条件

## 关键指标
- 指标1

## 风险提示
- 风险1"></textarea>
      </div>
      <div class="flex-1 flex flex-col">
        <div class="px-4 py-1.5 bg-[#1f2937] border-b border-gray-800 text-xs text-gray-400">实时预览</div>
        <div id="new-strategy-preview" class="flex-1 overflow-y-auto p-4 markdown-body"></div>
      </div>
    </div>
    <div class="px-4 py-2 border-t border-gray-800 flex items-center justify-between bg-[#111827]">
      <span id="new-strategy-status" class="text-sm text-gray-400"></span>
      <div class="flex gap-2">
        <button onclick="cancelNewStrategy()" class="px-4 py-1.5 bg-gray-700 hover:bg-gray-600 text-white text-sm rounded">取消</button>
        <button onclick="saveNewStrategy()" class="px-4 py-1.5 bg-green-600 hover:bg-green-700 text-white text-sm rounded">创建</button>
      </div>
    </div>`;
}

function updateNewStrategyPreview() {
  const editor = document.getElementById('new-strategy-editor');
  const preview = document.getElementById('new-strategy-preview');
  preview.innerHTML = marked.parse(editor.value);
}

function cancelNewStrategy() {
  document.getElementById('strategy-detail').innerHTML = `
    <div class="text-center text-gray-500 py-20">选择左侧战法查看详情</div>`;
}

async function saveNewStrategy() {
  const filename = document.getElementById('new-strategy-filename').value.trim();
  const content = document.getElementById('new-strategy-editor').value;
  const status = document.getElementById('new-strategy-status');

  if (!filename) {
    status.textContent = '请输入文件名';
    status.className = 'text-sm text-red-400';
    return;
  }

  if (!filename.endsWith('.md')) {
    status.textContent = '文件名必须以 .md 结尾';
    status.className = 'text-sm text-red-400';
    return;
  }

  if (!content.trim()) {
    status.textContent = '请输入战法内容';
    status.className = 'text-sm text-red-400';
    return;
  }

  status.textContent = '创建中...';
  status.className = 'text-sm text-yellow-400';

  try {
    const res = await fetch('/api/analysis/strategies', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, content })
    });
    const data = await res.json();

    if (data.error) {
      status.textContent = '错误: ' + data.error;
      status.className = 'text-sm text-red-400';
      return;
    }

    status.textContent = '✅ 创建成功';
    status.className = 'text-sm text-green-400';

    // 刷新列表
    await loadStrategies();

    // 1秒后显示新战法
    setTimeout(() => {
      const newIndex = allStrategies.findIndex(s => s.file === filename);
      if (newIndex >= 0) showStrategy(newIndex);
    }, 500);
  } catch (e) {
    status.textContent = '创建失败: ' + e.message;
    status.className = 'text-sm text-red-400';
  }
}
